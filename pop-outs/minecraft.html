<html>
<head>
</head>
<body>
<div style="text-align: center;">
<button onclick="openGame()"><font size="5">Launch Game</font></button>
</div>
<script>
function openGame() {
var win = window.open()
var url = "/embeds/minecraft/index.html"
var iframe = win.document.createElement('iframe')
iframe.style.width = "100%";
iframe.style.height = "100%";
iframe.style.border = "none";
iframe.src = url
win.document.body.appendChild(iframe)
}
</script>
</body>
</html>
